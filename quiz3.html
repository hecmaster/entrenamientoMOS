<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Word Expert - Quiz 3: Automatización y Control Avanzado</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --word-blue: #1d4ed8;
            --word-blue-glow: #60a5fa;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .quiz-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 800px;
            width: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.25rem;
            color: var(--word-blue-glow);
        }

        #progress {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .question-section h2 {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(96, 165, 250, 0.08);
            border-color: var(--word-blue-glow);
            transform: translateX(4px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .feedback-box {
            display: none;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .feedback-box.correct {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            color: #a7f3d0;
        }

        .feedback-box.incorrect {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
            color: #fca5a5;
        }

        .nav-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .next-btn {
            background: var(--word-blue);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }

        .next-btn:hover {
            background: #2563eb;
        }

        .score-screen {
            text-align: center;
            padding: 2rem 0;
        }

        .score-screen h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--word-blue-glow);
        }

        .score-screen p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .action-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-action {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--word-blue);
            color: white;
            border: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }
    </style>
</head>

            nextButton.style.display = "none";
            
            const currentData = questions[currentQ];
            progressTracker.innerText = `Pregunta ${currentQ + 1} de ${questions.length}`;
            questionText.innerText = currentData.q;
            
            optionsContainer.innerHTML = "";
            currentData.a.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });
        }

        function selectOption(selectedIndex) {
            const currentData = questions[currentQ];
            const buttons = optionsContainer.getElementsByClassName("option-btn");
            
            for(let btn of buttons) {
                btn.disabled = true;
            }

            if (selectedIndex === currentData.correct) {
                score++;
                feedbackBox.className = "feedback-box correct";
                feedbackBox.innerHTML = `<strong>¡Correcto!</strong> <br>${currentData.fb}`;
                buttons[selectedIndex].style.borderColor = "var(--success)";
                buttons[selectedIndex].style.background = "rgba(16, 185, 129, 0.15)";
            } else {
                feedbackBox.className = "feedback-box incorrect";
                feedbackBox.innerHTML = `<strong>Incorrecto.</strong> <br>${currentData.fb}`;
                buttons[selectedIndex].style.borderColor = "var(--error)";
                buttons[selectedIndex].style.background = "rgba(239, 68, 68, 0.15)";
                buttons[currentData.correct].style.borderColor = "var(--success)";
            }
            
            nextButton.style.display = "block";
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const container = document.getElementById("quiz-container");
            const percentage = Math.round((score / questions.length) * 100);
            
            container.innerHTML = `
                <div class="score-screen">
                    <h2>Simulación Finalizada</h2>
                    <p>Tu puntuación en Control Avanzado es de <strong>${score} de ${questions.length}</strong> correctas (${percentage}%).</p>
                    <div style="margin-bottom: 2rem; font-size: 1.2rem; font-weight: bold; color: ${percentage >= 85 ? 'var(--success)' : 'var(--error)'}">
                        ${percentage >= 85 ? '¡Excelente puntaje! Cumples los estándares MOS Champion.' : 'Por favor, refuerza la grabación de macros y restricción de formato.'}
                    </div>
                    <div class="action-group">
                        <button onclick="location.reload()" class="btn-action btn-primary">Reintentar</button>
                        <a href="index.html" class="btn-action btn-secondary">Volver al Panel</a>
                    </div>
                </div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
