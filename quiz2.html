<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Word Expert - Quiz 2: Referencias y Correspondencia</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --word-blue: #2b579a;
            --word-blue-glow: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .quiz-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 800px;
            width: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.25rem;
            color: var(--word-blue-glow);
        }

        #progress {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .question-section h2 {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.08);
            border-color: var(--word-blue-glow);
            transform: translateX(4px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .feedback-box {
            display: none;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .feedback-box.correct {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: #a7f3d0;
        }

        .feedback-box.incorrect {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fca5a5;
        }

        .nav-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .next-btn {
            background: var(--word-blue);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }

        .next-btn:hover {
            background: #1d3f73;
        }

        .score-screen {
            text-align: center;
            padding: 2rem 0;
        }

        .score-screen h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--word-blue-glow);
        }

        .score-screen p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .action-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-action {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--word-blue);
            color: white;
            border: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-container">
        <header>
            <h1>Quiz 2: Referencias y Correspondencia</h1>
            <div id="progress">Pregunta 1 de 20</div>
        </header>

        <div id="question-area">
            <div class="question-section">
                <h2 id="question-text">Cargando pregunta...</h2>
                <div class="options-grid" id="options-container">
                    </div>
            </div>

            <div id="feedback" class="feedback-box"></div>
        </div>

        <div class="nav-actions">
            <a href="index.html" class="back-link">&larr; Salir al Panel</a>
            <button id="next-button" class="next-btn" onclick="nextQuestion()">Siguiente &rarr;</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "1. Necesita actualizar los campos de un documento que contiene una Tabla de Ilustraciones. ¿Cuál es el procedimiento que garantiza que todas las etiquetas y números de página se actualicen simultáneamente sin alterar el formato personalizado?",
                a: [
                    "Hacer clic derecho sobre la tabla, seleccionar 'Actualizar campo' y luego elegir 'Actualizar toda la tabla'.",
                    "Seleccionar todo el documento (Ctrl+E) y presionar la tecla F9 para forzar la actualización del sistema de campos.",
                    "Ir a la pestaña Referencias, hacer clic en 'Insertar tabla de ilustraciones' y sobrescribir la existente.",
                    "Hacer doble clic en cualquier número de la tabla y digitar manualmente los valores correctos."
                ],
                correct: 0,
                fb: "¡Correcto! En la pestaña Referencias, 'Actualizar campo' > 'Actualizar toda la tabla' es el método estructurado oficial que preserva los marcadores internos y sincroniza cambios de títulos y páginas."
            },
            {
                q: "2. Al utilizar la herramienta de Combinación de Correspondencia, ¿qué regla lógica debe aplicar para insertar un texto condicional específico (ej. 'Aprobado') solo si el campo 'Nota' de la base de datos externa es mayor o igual a 80?",
                a: [
                    "Regla 'Preguntar' (Ask).",
                    "Regla 'Si... entonces... sino' (If...Then...Else...).",
                    "Regla 'Omitir registro si' (Skip Record If).",
                    "Regla 'Siguiente registro' (Next Record)."
                ],
                correct: 1,
                fb: "¡Excelente! La regla IF...THEN...ELSE (Si... entonces... sino) evalúa de manera dinámica los datos de entrada para personalizar cada salida impresa o enviada por correo electrónico."
            },
            {
                q: "3. Está configurando una bibliografía bajo el estilo APA. ¿Dónde debe modificar una fuente existente de modo que los cambios se reflejen de forma permanente en todos los documentos futuros y no solo en el actual?",
                a: [
                    "Modificando la fuente dentro de la 'Lista actual' en el Administrador de Fuentes.",
                    "Modificando la fuente dentro de la 'Lista general' (Master List) en el Administrador de Fuentes.",
                    "Editando directamente el texto de la cita bibliográfica al final del documento.",
                    "Guardando el archivo actual como una plantilla de Word (.dotx)."
                ],
                correct: 1,
                fb: "¡Correcto! La 'Lista general' se guarda de manera local en el perfil del sistema operativo de Word, permitiendo que cualquier documento nuevo pueda heredar la fuente corregida."
            },
            {
                q: "4. Necesita crear un índice de términos clave al final del documento. ¿Qué acción debe realizar primero antes de poder insertar la tabla de índice en la pestaña Referencias?",
                a: [
                    "Marcar cada entrada (Alt+Mayús+X) en el texto del documento.",
                    "Crear una tabla con dos columnas titulada 'Índice'.",
                    "Aplicar el estilo 'Título 1' a todas las palabras del índice.",
                    "Generar marcadores individuales en la pestaña Insertar."
                ],
                correct: 0,
                fb: "¡Soberbio! No puedes generar un índice dinámico sin marcar previamente los conceptos del texto mediante el comando 'Marcar entrada'."
            },
            {
                q: "5. ¿Qué comando de correspondencia permite excluir de forma directa destinatarios específicos de una lista de distribución sin alterar el archivo de origen (ej. Excel)?",
                a: [
                    "Filtrar y ordenar en 'Editar lista de destinatarios'.",
                    "Hacer clic en 'Bloque de direcciones' y desmarcar campos.",
                    "Asignar campos manualmente.",
                    "Insertar una línea de saludo condicional."
                ],
                correct: 0,
                fb: "¡Exacto! El menú 'Editar lista de destinatarios' permite filtrar registros dinámicamente y desmarcar las casillas de verificación de destinatarios específicos."
            },
            {
                q: "6. Para citar una fuente que tiene un 'Autor Corporativo' en lugar de un nombre individual, ¿cómo se debe estructurar para evitar que Word trate al organismo como un nombre y apellido (ej. 'Latina, A. E.')?",
                a: [
                    "Escribir el nombre completo en el campo 'Autor' encerrado entre corchetes.",
                    "Activar la casilla 'Autor corporativo' en el cuadro de diálogo de la fuente.",
                    "Colocar guiones bajos entre cada palabra en el campo 'Apellidos'.",
                    "Utilizar el campo de edición de fuente XML avanzado."
                ],
                correct: 1,
                fb: "¡Correcto! Activar 'Autor corporativo' le indica a Word que no divida el texto por espacios ni intente abreviar el nombre como si fuese una persona."
            },
            {
                q: "7. ¿Cuál es el propósito real del comando 'Asignar campos' en el proceso de Combinación de Correspondencia?",
                a: [
                    "Relacionar los nombres de columna de tu origen de datos con los nombres genéricos de campos que busca Word.",
                    "Cambiar el formato de las fuentes de los campos a Arial o Calibri.",
                    "Unificar dos bases de datos de Excel en un solo archivo plano.",
                    "Ocultar los datos sensibles del remitente durante el envío masivo."
                ],
                correct: 0,
                fb: "¡Muy bien! 'Asignar campos' mapea etiquetas como 'Primer nombre' con columnas como 'NOM_CLI' de tu base de datos externa."
            },
            {
                q: "8. Al generar una Tabla de Autoridades para un documento legal, ¿qué comando se utiliza para agrupar casos constitucionales separados de estatutos o reglamentos?",
                a: [
                    "Categoría (dentro de Marcar cita).",
                    "Nivel de esquema.",
                    "Estilo de tabla dinámico.",
                    "Marcador de posición."
                ],
                correct: 0,
                fb: "¡Así es! Al marcar una cita legal (Alt+Mayús+I), debes asignarla a una categoría específica para que al insertar la tabla aparezcan divididos de forma organizada."
            },
            {
                q: "9. Si desea cambiar todo el documento del formato bibliográfico APA al formato MLA, ¿cuál es el método más rápido y automático?",
                a: [
                    "Cambiar el estilo en el menú desplegable 'Estilo' del grupo Citas y bibliografía.",
                    "Reescribir manualmente cada una de las citas bibliográficas.",
                    "Modificar la plantilla de estilos rápidos del panel de Inicio.",
                    "Hacer clic en 'Actualizar citas y bibliografía' con el clic derecho."
                ],
                correct: 0,
                fb: "¡Exacto! Word almacena la metadata de tus fuentes. Al cambiar el desplegable de APA a MLA en la pestaña Referencias, todo el documento se actualiza al instante."
            },
            {
                q: "10. ¿Qué sucede al marcar la opción 'Actualizar campos antes de imprimir' en las Opciones de Word > Avanzadas?",
                a: [
                    "Word forzará de forma automática la actualización de tablas de contenido, referencias cruzadas y campos de correspondencia justo antes de enviar a la cola de impresión.",
                    "El documento se bloqueará para evitar ediciones en red.",
                    "Se eliminarán todos los hipervínculos del documento.",
                    "Se enviará una alerta de error por cada macro activa."
                ],
                correct: 0,
                fb: "¡Excelente! Esta es una directiva fundamental para evitar el envío a impresión de documentos con números de páginas obsoletos en los índices."
            },
            // Preguntas 11 a 20 (Para completar las 20 estructuradas y difíciles)
            { q: "11. Al insertar una nota al pie de página, ¿cómo se asegura de que la numeración comience de nuevo en '1' al iniciar cada nueva sección del documento?", a: ["En el cuadro de diálogo 'Nota al pie y nota al final', cambiar la Numeración a 'Reiniciar en cada sección'.", "Crear manualmente cada nota utilizando números en superíndice de manera secuencial.", "Insertar un salto de página simple antes de cada nota.", "Convertir todas las notas al pie en notas al final."], correct: 0, fb: "Sincronizar las notas con las secciones de Word es el método óptimo para documentos extensos o tesis." },
            { q: "12. ¿Qué extensión de archivo predeterminada utiliza Word para almacenar listas de direcciones creadas desde su propia interfaz durante la combinación de correspondencia?", a: [".mdb (Microsoft Access Database)", ".chm", ".xml", ".txt"], correct: 0, fb: "Word genera una base de datos local en formato .mdb a través de Access para almacenar y gestionar los destinatarios estructurados." },
            { q: "13. ¿Cuál es el límite de niveles de títulos (cabeceras) que Word puede procesar de forma automática al insertar una Tabla de Contenido estándar sin modificar sus opciones avanzadas?", a: ["3 niveles", "5 niveles", "9 niveles", "Ilimitados"], correct: 0, fb: "De forma predeterminada, Word compila únicamente los títulos asignados a los niveles Estilo 1, 2 y 3. Para más, se debe editar la opción avanzada de niveles." },
            { q: "14. En combinación de correspondencia, ¿qué campo especial permite evaluar si un campo del destinatario está vacío y, en su defecto, escribir un saludo genérico como 'Estimado Cliente'?", a: ["Regla 'Si... entonces... sino' evaluando el campo como 'Está vacío'.", "Campo MergeSeq.", "Campo Next.", "Insertar código de barra postal."], correct: 0, fb: "Al evaluar si el campo 'Nombre' está vacío con un IF/THEN/ELSE, puedes controlar si usas el nombre real o una etiqueta genérica." },
            { q: "15. ¿Qué utilidad tiene un 'Marcador de posición' dentro de la administración de citas de Word?", a: ["Reservar un espacio en el documento para una cita cuya fuente bibliográfica detallada se creará más adelante.", "Establecer una marca de agua transparente de seguridad.", "Configurar el tamaño máximo que ocupará la bibliografía final.", "Anclar un gráfico dinámico al final de un capítulo."], correct: 0, fb: "El marcador crea una cita temporal (ej. 'Smit15') para que no olvides citar, permitiendo rellenar los metadatos después." },
            { q: "16. ¿Qué atajo de teclado en Windows permite alternar un campo seleccionado entre su código interno (ej. { TOC \\o \"1-3\" }) y su resultado visual en el documento?", a: ["Alt + F9", "Ctrl + F9", "F9 directo", "Mayús + F9"], correct: 3, fb: "Mayús + F9 alterna el código de un campo seleccionado, mientras que Alt+F9 alterna todos los códigos de campo de todo el documento." },
            { q: "17. ¿Cuál es la diferencia técnica entre una Cita y una Bibliografía en el estándar de Word?", a: ["La cita hace referencia breve dentro del párrafo; la bibliografía es el catálogo detallado de fuentes al final del archivo.", "La cita solo incluye autores vivos; la bibliografía incluye a todos.", "La cita es estática y la bibliografía es dinámica.", "No hay diferencia real, son sinónimos técnicos."], correct: 0, fb: "La cita vincula de manera ágil las ideas con su origen de manera textual, y la bibliografía compila todas de forma sistemática." },
            { q: "18. ¿Cómo se define el formato de salida para códigos postales o monedas al insertar campos de combinación de correspondencia en el documento principal?", a: ["Agregando modificadores de formato de imagen de campo (Switches) como \\# o \\@ en el código de campo.", "Modificando las opciones regionales del sistema operativo Windows.", "Cambiando el origen de datos en Excel a formato de texto antes de enlazar.", "Aplicando estilos rápidos al texto del campo directamente."], correct: 0, fb: "Los modificadores de formato de campo (ej. { MERGEFIELD Sueldo \\# $#,##0.00 }) formatean con precisión números en Word." },
            { q: "19. Al crear una referencia cruzada hacia un elemento numerado, ¿qué opción permite mostrar el texto literal del título en lugar del número secuencial?", a: ["Texto del epígrafe", "Número de página", "Solo número de etiqueta", "Número de párrafo"], correct: 0, fb: "La opción 'Texto del epígrafe' extrae de forma íntegra el título para colocarlo directamente como enlace dentro del párrafo activo." },
            { q: "20. Al finalizar una combinación de correspondencia, ¿qué comando genera un nuevo documento unificado que contiene todas las cartas individuales separadas por saltos de sección?", a: ["Editar documentos individuales", "Imprimir documentos", "Enviar mensajes de correo electrónico", "Guardar plantilla maestra"], correct: 0, fb: "La opción 'Editar documentos individuales' procesa toda la combinación y genera un archivo final (.docx) con todas las cartas unificadas." }
        ];

        let currentQ = 0;
        let score = 0;

        const questionText = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options-container");
        const feedbackBox = document.getElementById("feedback");
        const nextButton = document.getElementById("next-button");
        const progressTracker = document.getElementById("progress");

        function loadQuestion() {
            feedbackBox.style.display = "none";
            nextButton.style.display = "none";
            
            const currentData = questions[currentQ];
            progressTracker.innerText = `Pregunta ${currentQ + 1} de${questions.length}`;
            questionText.innerText = currentData.q;
            
            optionsContainer.innerHTML = "";
            currentData.a.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });
        }

        function selectOption(selectedIndex) {
            const currentData = questions[currentQ];
            const buttons = optionsContainer.getElementsByClassName("option-btn");
            
            // Deshabilitar todos los botones de opciones
            for(let btn of buttons) {
                btn.disabled = true;
            }

            // Validar respuesta
            if (selectedIndex === currentData.correct) {
                score++;
                feedbackBox.className = "feedback-box correct";
                feedbackBox.innerHTML = `<strong>¡Correcto!</strong> <br>${currentData.fb}`;
                buttons[selectedIndex].style.borderColor = "var(--success)";
                buttons[selectedIndex].style.background = "rgba(16, 185, 129, 0.15)";
            } else {
                feedbackBox.className = "feedback-box incorrect";
                feedbackBox.innerHTML = `<strong>Incorrecto.</strong> <br>${currentData.fb}`;
                buttons[selectedIndex].style.borderColor = "var(--error)";
                buttons[selectedIndex].style.background = "rgba(239, 68, 68, 0.15)";
                buttons[currentData.correct].style.borderColor = "var(--success)";
            }
            
            nextButton.style.display = "block";
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const container = document.getElementById("quiz-container");
            const percentage = Math.round((score / questions.length) * 100);
            
            container.innerHTML = `
                <div class="score-screen">
                    <h2>Simulación Finalizada</h2>
                    <p>Tu puntuación es de <strong>${score} de ${questions.length}</strong> correctas (${percentage}%).</p>
                    <div style="margin-bottom: 2rem; font-size: 1.2rem; font-weight: bold; color: ${percentage >= 85 ? 'var(--success)' : 'var(--error)'}">
                        ${percentage >= 85 ? '¡Excelente nivel! Listo para la clasificación.' : 'Se recomienda repasar la teoría antes del mundial.'}
                    </div>
                    <div class="action-group">
                        <button onclick="location.reload()" class="btn-action btn-primary">Reintentar</button>
                        <a href="index.html" class="btn-action btn-secondary">Volver al Panel</a>
                    </div>
                </div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
